<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vacation packages to the most legendary destinations that (mostly) do not exist. Browse, like and plan trips to Hogwarts, Middle-earth, Atlantis and more." />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F9F1E3" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#211C13" />
    <meta property="og:title" content="Otherworld Vacations" />
    <meta property="og:description" content="Departures daily from platforms that don't exist." />
    <meta property="og:type" content="website" />
    <title>Otherworld Vacations</title>
    <script>
      // set the theme before first paint so there is no flash:
      // saved preference wins, otherwise follow the system
      (function () {
        try {
          var theme = localStorage.getItem('theme')
          if (!theme) theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          document.documentElement.dataset.theme = theme
        } catch (e) { /* no storage - css media query fallback applies */ }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
