# every service below is one container of the otherworld vacations system
services:
  # mysql, seeded on first startup from database/otherworld.sql
  database:
    container_name: otherworld-db-compose
    volumes:
      - otherworld-mysql-data:/var/lib/mysql
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=1
      - MYSQL_DATABASE=otherworld
      - MYSQL_TCP_PORT=3306
    expose:
      - 3306
    ports:
      - 3306:3306
    build: ./database
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
      
  # s3-compatible storage for the vacation images
  localstack:
    container_name: otherworld-localstack-compose
    ports:
      - 4566:4566
      - 4510-4559:4510-4559
    image: localstack/localstack:4.4.0

  io:
    container_name: otherworld-io-compose
    ports:
      - 3004:3004
    build: ./io

  mcp:
    container_name: otherworld-mcp-compose
    ports:
      - 3005:3005
    build: ./mcp
    depends_on:
      - backend

  # express rest api
  backend:
    container_name: otherworld-backend-compose
    ports:
      - 3010:3000
    environment:
      # pass the LLM key from the host shell into the container:
      # OTHERWORLD_OPENAI_API_KEY=sk-... docker compose up -d --build
      - OTHERWORLD_OPENAI_API_KEY=${OTHERWORLD_OPENAI_API_KEY}
    build:
      context: ./backend
      dockerfile: Dockerfile.compose
    depends_on:
      database:
        condition: service_healthy
  
  # react spa, built and served by nginx
  frontend:
    container_name: otherworld-front-compose
    ports:
      - 6124:80
    build:
      context: ./frontend
      dockerfile: Dockerfile.compose

volumes:
  otherworld-mysql-data:
